name=Universal_Button
version=1.6.3
author=Little Man Builds (Darren Osborne)
maintainer=Little Man Builds <littlemanbuilds@gmail.com>
sentence=Generic multi-button handler with debounce, short/long/double events, optional latching, exact press duration, pluggable readers, enum-friendly API, helpers, and custom time-source injection.
paragraph=Header-only Arduino library for handling multiple buttons with robust debounce; short/long/double classification; optional latching (toggle/set/reset driven by Short/Long/Double events); exact getLastPressDuration(); per-button overrides (timing—including double_click_ms—polarity, enable, latch config); reader callbacks for GPIO and expanders (e.g., MCP23017); and helpers (pressedMask/snapshot/forEach/sizeStatic, plus indexFromKey/indexFromKeyIn utilities). Runtime setters include setReadFn/setReadPinFn, setGlobalTiming (alias setTiming), setPerConfig, enable, setActiveLow, and setTimeFn for custom timing sources (for example FreeRTOS tick-derived milliseconds). Includes latch control APIs (setLatched/clearAllLatched/clearLatchedMask), optional strict mapping via UB_REQUIRE_BUTTON_LIST, and examples covering GPIO, local enum mapping, port-expander readers, cached reads, and latching.
category=Signal Input/Output
url=https://github.com/LittleManBuilds/Universal_Button
license=MIT
architectures=avr,megaavr,sam,samd,esp32,esp8266,stm32,teensy,rp2040
includes=Universal_Button.h
